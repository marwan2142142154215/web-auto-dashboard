<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Claim Automation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); border-radius: 28px; padding: 24px 32px; margin-bottom: 28px; color: white; }
        .form-card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 32px; }
        .form-grid { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; }
        .input-group { flex: 1; min-width: 200px; }
        .input-group label { font-weight: 600; display: block; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 20px; }
        .btn-submit { background: #1e293b; color: white; border: none; padding: 12px 28px; border-radius: 40px; cursor: pointer; }
        .table-wrapper { background: white; border-radius: 28px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .badge-pending { background: #fef9c3; padding: 4px 12px; border-radius: 40px; }
        .badge-approved { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 40px; }
        .badge-rejected { background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 40px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 20px; border-radius: 40px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🎫 Ticket Claim Automation</h1><p>Real-time · Auto claim di background · Update setiap 5 detik</p></div>
    <div class="form-card">
        <div class="form-grid">
            <div class="input-group"><label>User ID</label><input id="userId" placeholder="gemar88vip"></div>
            <div class="input-group"><label>Kode Tiket</label><input id="ticketCode" placeholder="246514545455000"></div>
            <div class="input-group"><label>Betting (opsional)</label><input id="bettingManual" placeholder="Auto"></div>
            <button class="btn-submit" id="submitBtn">🚀 Proses Klaim</button>
        </div>
    </div>
    <div class="table-wrapper">
        <table><thead><tr><th>User ID</th><th>Kode Tiket</th><th>Betting</th><th>Scatter</th><th>Status</th><th>Keterangan</th><th>Waktu</th></tr></thead><tbody id="claimsBody"><tr><td colspan="7">Memuat...</td></tr></tbody></table>
    </div>
</div>
<div id="toast" class="toast"></div>
<script>
    const tbody = document.getElementById('claimsBody');
    const toast = document.getElementById('toast');
    function showToast(msg, isError=false) { toast.textContent = msg; toast.style.display = 'block'; toast.style.background = isError ? '#b91c1c' : '#0f172a'; setTimeout(()=>toast.style.display='none',4000); }
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    async function loadData() {
        try {
            const res = await fetch('/api/claims');
            const data = await res.json();
            if(!data.length) { tbody.innerHTML = '<tr><td colspan="7">Belum ada data</td></tr>'; return; }
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>${escapeHtml(c.userId)}</td>
                    <td>${escapeHtml(c.ticketCode)}</td>
                    <td>${c.betting || '-'}</td>
                    <td>${c.scatter || '-'}</td>
                    <td><span class="badge-${(c.status || 'PENDING').toLowerCase()}">${c.status || 'PENDING'}</span></td>
                    <td>${escapeHtml(c.remark || '')}</td>
                    <td>${new Date(c.createdAt).toLocaleString()}</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }
    document.getElementById('submitBtn').onclick = async () => {
        const userId = document.getElementById('userId').value.trim();
        const ticketCode = document.getElementById('ticketCode').value.trim();
        const betting = document.getElementById('bettingManual').value.trim();
        if(!userId || !ticketCode) return showToast('Isi semua field!', true);
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = '⏳ Memproses...';
        try {
            const res = await fetch('/api/claim', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ userId, ticketCode, manualBetting: betting || null }) });
            const json = await res.json();
            if(!res.ok) throw new Error(json.error);
            showToast('✅ Klaim diterima, diproses background');
            document.getElementById('userId').value = '';
            document.getElementById('ticketCode').value = '';
            document.getElementById('bettingManual').value = '';
            setTimeout(loadData, 1000);
        } catch(e) { showToast('❌ '+e.message, true); }
        finally { btn.disabled = false; btn.textContent = '🚀 Proses Klaim'; }
    };
    loadData();
    setInterval(loadData, 5000);
</script>
</body>
</html>
